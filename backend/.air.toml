# Air: hot reload для Go — см. https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "CGO_ENABLED=1 go build -buildvcs=false -o ./tmp/main ./cmd/server"
  delay = 500
  exclude_dir = ["tmp", "vendor", "storage"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "mod", "sum"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = false

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true
